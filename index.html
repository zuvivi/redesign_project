<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리디자인 프로젝트</title>

    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <!-- 메뉴 버튼 -->
        <button class="menu-btn">
          <svg
            width="28"
            height="28"
            stroke="#01F55F"
            fill="none"
            stroke-width="2"
          >
            <line x1="3" y1="7" x2="25" y2="7" />
            <line x1="3" y1="14" x2="25" y2="14" />
            <line x1="3" y1="21" x2="25" y2="21" />
          </svg>
        </button>

        <!-- 로고 -->
        <img
          src="assets/images/melon-logo.png"
          class="logo"
          onclick="goHome()"
        />
      </div>

      <!-- 검색창 -->
      <div class="search-box">
        <svg
          class="search-icon"
          width="18"
          height="18"
          stroke="#7E8681"
          fill="none"
          stroke-width="2"
        >
          <circle cx="8" cy="8" r="6" />
          <line x1="13" y1="13" x2="17" y2="17" />
        </svg>

        <input type="text" placeholder="검색어를 입력하세요" />
      </div>

      <div class="header-right">
        <button class="ticket-btn" onclick="goTicket()">이용권 구매</button>

        <!-- 프로필 -->
        <button class="icon-btn" onclick="goLogin()">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            stroke="#01F55F"
            fill="none"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <!-- head -->
            <circle cx="12" cy="7" r="3.5"></circle>

            <!-- shoulders -->
            <path d="M4 18c2-3 14-3 16 0"></path>
          </svg>
        </button>

        <!-- 설정 -->
        <button class="icon-btn" onclick="goSetting()">
          <svg
            width="24"
            height="24"
            stroke="#01F55F"
            fill="none"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3" />

a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
        <button class="icon-btn">
          <svg
            width="24"
            height="24"
            stroke="#01F55F"
            fill="none"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06
a2 2 0 1 1-2.83 2.83l-.06-.06
a1.65 1.65 0 0 0-1.82-.33

            />
          </svg>
        </button>
      </div>
    </header>
    <!-- 사이드 메뉴 -->
    <div class="side-menu">
      <div class="menu-item" onclick="goPage('메뉴')">메뉴</div>

      <div class="menu-item" onclick="goPage('차트')">차트</div>
    </div>
    <section class="hero">
      <div class="hero-inner">
        <img
          src="assets/images/hero-image.png"
          alt="히어로 이미지"
          class="hero-img"
        />
      </div>
    </section>
    <section class="chart-section">
      <h2 class="section-title">
        <span class="v-line"></span>
        지금, 멜론차트 Top 4
        <span class="v-line"></span>
      </h2>

      <div class="chart-cards">
        <!-- 1위 -->
        <div class="chart-card">
          <div class="card-left">
            <div class="rank-circle">1</div>
          </div>

          <div class="card-divider">
            <div class="line"></div>
            <button class="play-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#121212">
                <polygon points="8,5 19,12 8,19" />
                <path d="M8 5v14l11-7z" fill="#121212" />
              </svg>
            </button>
          </div>

          <div class="card-right">
            <div class="right-content">
              <div class="text-box">
                <h3 class="title">그대 작은 나의 세상이 되어</h3>
                <p class="artist">카더가든</p>
                <p class="album">부재</p>
                <span class="tag">[EP]</span>
              </div>
              <img src="assets/images/album-image1.png" class="album-img" />
            </div>
          </div>
        </div>

        <!-- 2위 -->
        <div class="chart-card">
          <div class="card-left">
            <div class="rank-circle">2</div>
          </div>

          <div class="card-divider">
            <div class="line"></div>
            <button class="play-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#121212">
                <polygon points="8,5 19,12 8,19" />
                <path d="M8 5v14l11-7z" fill="#121212" />
              </svg>
            </button>
          </div>

          <div class="card-right">
            <div class="right-content">
              <div class="text-box">
                <h3 class="title">Good Goodbye</h3>
                <p class="artist">화사</p>
                <p class="album">Good Goodbye</p>
                <span class="tag">[싱글]</span>
              </div>
              <img src="assets/images/album-image3.png" class="album-img" />
            </div>
          </div>
        </div>

        <!-- 3위 -->
        <div class="chart-card">
          <div class="card-left">
            <div class="rank-circle">3</div>
          </div>

          <div class="card-divider">
            <div class="line"></div>
            <button class="play-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#121212">
                <polygon points="8,5 19,12 8,19" />
                <path d="M8 5v14l11-7z" fill="#121212" />
              </svg>
            </button>
          </div>

          <div class="card-right">
            <div class="right-content">
              <div class="text-box">
                <h3 class="title">사랑하게 될 거야</h3>
                <p class="artist">한로로</p>
                <p class="album">이상비행</p>
                <span class="tag">[EP]</span>
              </div>
              <img src="assets/images/album-image2.png" class="album-img" />
            </div>
          </div>
        </div>

        <!-- 4위 -->
        <div class="chart-card">
          <div class="card-left">
            <div class="rank-circle">4</div>
          </div>

          <div class="card-divider">
            <div class="line"></div>
            <button class="play-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#121212">
                <polygon points="8,5 19,12 8,19" />
                <path d="M8 5v14l11-7z" fill="#121212" />
              </svg>
            </button>
          </div>

          <div class="card-right">
            <div class="right-content">
              <div class="text-box">
                <h3 class="title">Drowning</h3>
                <p class="artist">WOODZ</p>
                <p class="album">OO-LI</p>
                <span class="tag">[EP]</span>
              </div>
              <img src="assets/images/album-image4.png" class="album-img" />
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
